<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 复杂渐变和颜色测试文件 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0000ff;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <rect x="10" y="10" width="80" height="80" fill="url(#grad1)" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="50" r="40" fill="url(#grad2)" stroke="#666" stroke-width="3"/>
  
  <g fill="#e74c3c" stroke="#c0392b">
    <rect x="10" y="110" width="30" height="30"/>
    <rect x="50" y="110" width="30" height="30" fill="#3498db"/>
  </g>
  
  <text x="100" y="130" font-family="Arial" font-size="16" fill="#2c3e50" stroke="#34495e" stroke-width="0.5">测试文本</text>
  
  <path d="M10,160 Q50,140 90,160 T170,160" fill="none" stroke="#e67e22" stroke-width="4" opacity="0.8"/>
  
  <polygon points="120,170 140,190 160,170 150,150 130,150" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" fill-opacity="0.7"/>
</svg>